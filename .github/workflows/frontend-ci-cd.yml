name: Frontend CI/CD

on:
  push:
    branches: [ main, feature/full-stack ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      # ADDED: Requirement for Security Scanning
      - name: Security Scan (npm audit)
        working-directory: frontend
        run: npm audit --audit-level moderate

      # ADDED: Requirement for Unit Tests
      - name: Run Unit Tests
        working-directory: frontend
        run: npm test -- --watchAll=false

      - name: Build Production Bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://${{ secrets.ALB_DNS }}

      # REFINED: Use official AWS action (Senior standard)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
