name: Backend CI/CD
on:
  push:
    branches: [ main, feature/full-stack ] # Added your current branch
    paths: [ 'backend/**' ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        run: |
          # Use a unique tag (the commit hash) instead of just 'latest' to avoid caching issues
          docker build -t ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }} ./backend
          docker tag ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/starttech-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/starttech-backend:latest
      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/starttech-backend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          

      - name: Update ASG
        run: |
          # This command tells the ASG to replace its instances with new ones.
          # IMPORTANT: Your ASG's UserData must contain 'docker pull' to get the latest image!
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name starttech-backend-asg \
            --preferences '{"MinHealthyPercentage": 50}'
