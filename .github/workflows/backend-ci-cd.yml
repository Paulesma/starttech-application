name: Backend CI/CD

on:
  push:
    branches: [ main, feature/full-stack ]
    paths: [ 'backend/**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify Identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPOSITORY=starttech-backend
          IMAGE_TAG=${{ github.sha }}
          
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./backend
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Update Launch Template & Refresh ASG
        run: |
          # 1. Get the Launch Template ID
          LT_ID=$(aws ec2 describe-launch-templates --launch-template-names backend-lt-20260525134148455300000001 --query 'LaunchTemplates[0].LaunchTemplateId' --output text)
          
          # 2. Encode the new UserData script (Optimized for Ubuntu 24.04)
          USER_DATA=$(cat <<EOF | base64 -w 0
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          
          # Update and install dependencies
          sudo apt-get update -y
          sudo apt-get install -y docker.io awscli
          
          sudo systemctl start docker
          sudo systemctl enable docker
          
          # Add ubuntu user to docker group
          sudo usermod -aG docker ubuntu
          
          # Login to ECR
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          
          # Pull the specific tag from this commit
          docker pull ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          
          # SENIOR FIX: Stop and remove existing container by name to avoid port/name conflicts
          docker rm -f backend || true

          # Run the container
          docker run -d \
            --name backend \
            -p 8080:8080 \
            -e MONGO_URI="${{ secrets.MONGO_URI }}" \
            -e REDIS_URL="${{ secrets.REDIS_URL }}" \
            -e PORT="8080" \
            ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          EOF
          )

          # 3. Create the new Launch Template version
          aws ec2 create-launch-template-version \
            --launch-template-id $LT_ID \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"$USER_DATA\"}"
            
          # 4. Trigger the Refresh
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name backend-asg \
            --preferences '{"MinHealthyPercentage": 50}'

      - name: Wait for Deployment & Run Health Check
        run: |
          # 4-minute wait for Ubuntu package installation and ECR pull
          sleep 240
          
          # Get the ALB DNS Name dynamically
          ALB_DNS=$(aws elbv2 describe-load-balancers --names backend-alb --query 'LoadBalancers[0].DNSName' --output text)
          
          # Run health check
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh $ALB_DNS
