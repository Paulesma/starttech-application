name: Backend CI/CD

on:
  push:
    branches: [ main, feature/full-stack ]
    paths: [ 'backend/**' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Verify Identity
        run: aws sts get-caller-identity


      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPOSITORY=starttech-backend
          IMAGE_TAG=${{ github.sha }}
          
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./backend
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          
          # Output the image name for the next steps
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Update Launch Template & Refresh ASG
        run: |
          # 1. Get the Launch Template ID using your specific name
          LT_ID=$(aws ec2 describe-launch-templates --launch-template-names backend-lt-20260525134148455300000001 --query 'LaunchTemplates[0].LaunchTemplateId' --output text)
          
          # 2. Encode the new UserData script to Base64 (Required for CLI)
          # This script ensures the new instance pulls the exact image tag built in this run
          USER_DATA=$(cat <<EOF | base64 -w 0
          #!/bin/bash
          sudo yum update -y
          sudo yum install -y docker
          sudo systemctl start docker
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          docker pull ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          docker run -d -p 80:8080 ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          EOF
          )

          # 3. Create a new version of the Launch Template with the updated UserData
          aws ec2 create-launch-template-version \
            --launch-template-id $LT_ID \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"$USER_DATA\"}"
            
          # 4. Trigger the Refresh on your specific Auto Scaling Group
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name terraform-20260525134202399700000004 \
            --preferences '{"MinHealthyPercentage": 50}'
